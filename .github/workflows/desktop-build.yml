name: Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ENGINE_URL: ${{ secrets.VITE_ENGINE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Sovereign OS ${{ github.ref_name }}'
          releaseBody: 'See release notes.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Generate latest.json
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $repo    = "${{ github.repository }}"

          # .sig dosyasını dinamik bul (productName ne olursa olsun)
          $sigFile = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi.zip.sig" |
                     Select-Object -First 1
          if (-not $sigFile) {
            Write-Error "MSI .sig dosyasi bulunamadi"
            exit 1
          }

          $signature = (Get-Content $sigFile.FullName -Raw).Trim()

          # GitHub release download URL — dosya adı tauri-action'ın yüklediğiyle aynı
          $msiZipName = $sigFile.BaseName  # "ProductName_x.y.z_x64_en-US.msi.zip"
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$msiZipName"

          $latestJson = [ordered]@{
            version  = $version
            notes    = "See release notes."
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                url       = $downloadUrl
                signature = $signature
              }
            }
          } | ConvertTo-Json -Depth 5

          $latestJson | Out-File -FilePath "latest.json" -Encoding utf8NoBOM

          # Release'e upload et (varsa üzerine yaz)
          gh release upload $tag latest.json --clobber
